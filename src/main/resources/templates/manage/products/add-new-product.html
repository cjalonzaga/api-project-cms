<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <meta name="description" content="CoreUI - Open Source Bootstrap Admin Template">
    <meta name="author" content="Łukasz Holeczek">
    <meta name="keyword" content="Bootstrap,Admin,Template,Open,Source,jQuery,CSS,HTML,RWD,Dashboard">
    <title>Content Management System</title>
    <meta name="msapplication-TileColor" content="#ffffff">
    <meta name="theme-color" content="#ffffff">
    <!-- Vendors styles-->
    <link rel="stylesheet" href="/vendors/simplebar/css/simplebar.css">
    <link rel="stylesheet" href="/css/vendors/simplebar.css">
    <!-- Main styles for this application-->
    <link href="/css/style.css" rel="stylesheet">
    <!-- We use those styles to show code examples, you should remove them in your application.-->
    <link href="/css/examples.css" rel="stylesheet">
    <link href="/css/custom.css" rel="stylesheet">
    <link href="/css/font-awesome/all.min.css" rel="stylesheet">
	
	<script src="/vendors/quill/quill.js"></script>
	<link rel="stylesheet" href="/vendors/quill/quill.snow.css"/>
</head>
<body>
	<!-- to include sidebar.html -->
	<div th:replace="~{includes/sidebar :: sidebar}"></div>
	
    <div class="wrapper d-flex flex-column min-vh-100 bg-light">
      
      <div th:replace="~{includes/subheader :: subheader}"></div>
      
      <div class="body flex-grow-1 px-3">
        	<div class="row">
	            <div class="col-md-9">
					<h1>New Product</h1>
					<div class="input-group mb-3">
					  <input type="text" class="form-control" placeholder="Add new product" aria-label="new-product" aria-describedby="basic-addon1">
					</div>
	                <div class="card mb-4">
	                    <div class="card-body">
							<h6>Product Description</h6>
							<hr>
							<div id="editor">
								
							</div>
	                    </div>
	                </div>
					
					<div class="card mb-4">
	                    <div class="card-body">
							<h6>Product Data</h6>
							<hr>
	                    </div>
	                </div>
					
					<div class="card mb-4">
	                    <div class="card-body">
							<h6>Product Short Description</h6>
							<hr>
							<div id="editor2">
								
							</div>
	                    </div>
	                </div>
	            </div>
				
				<div class="col-md-3">
					
				</div>
        	</div>
        </div>
                 
      
      <div class="footer">
        <div><a href="#"></a><a href="#"></a> © 2024 OPMS V.1</div>
        <div class="ms-auto">Online Portfolio Management System</div>
      </div>
    </div>
    
    <footer th:replace="~{includes/footer :: footer}"></footer>
    <script>
		const quill = new Quill('#editor', {
		    theme: 'snow'
		});
		const quill2 = new Quill('#editor2', {
		    theme: 'snow'
		});
	</script>
</body>
</html>
